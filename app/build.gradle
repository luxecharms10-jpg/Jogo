plugins {
    id 'com.android.application'
}

android {
    namespace 'jogo.tets.com'
    compileSdk 34

    defaultConfig {
        applicationId "jogo.test.com"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
    }

    packagingOptions {
    resources {
        excludes += ['META-INF/*']
    }
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'           // 🔥 ESSENCIAL
    implementation 'androidx.core:core-ktx:1.12.0'       // 🔥 ESSENCIAL
}
